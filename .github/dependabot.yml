# Dependabot keeps dependencies up to date by opening PRs on a schedule.
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Grouping strategy:
#   - patch/minor bumps are grouped into a single "patch-and-minor" PR per ecosystem per week
#     (fewer admin-merge cycles; related libs that move in lockstep — e.g. tailwindcss + @tailwindcss/cli — land together)
#   - major bumps stay ungrouped so each one gets its own review-and-test pass

version: 2
updates:
    # NuGet for the API project
    - package-ecosystem: "nuget"
      directory: "/HurrahTv.Api"
      schedule:
          interval: "weekly"
          day: "monday"
      open-pull-requests-limit: 5
      reviewers:
          - "mkerchenski"
      labels:
          - "type:chore"
          - "area:api"
      commit-message:
          prefix: "deps(api)"
      groups:
          patch-and-minor:
              update-types:
                  - "patch"
                  - "minor"

    # NuGet for the Client (Blazor WASM) project
    - package-ecosystem: "nuget"
      directory: "/HurrahTv.Client"
      schedule:
          interval: "weekly"
          day: "monday"
      open-pull-requests-limit: 5
      reviewers:
          - "mkerchenski"
      labels:
          - "type:chore"
          - "area:client"
      commit-message:
          prefix: "deps(client)"
      groups:
          patch-and-minor:
              update-types:
                  - "patch"
                  - "minor"

    # NuGet for the Shared project
    - package-ecosystem: "nuget"
      directory: "/HurrahTv.Shared"
      schedule:
          interval: "weekly"
          day: "monday"
      open-pull-requests-limit: 3
      reviewers:
          - "mkerchenski"
      labels:
          - "type:chore"
      commit-message:
          prefix: "deps(shared)"
      groups:
          patch-and-minor:
              update-types:
                  - "patch"
                  - "minor"

    # npm for the Client (Tailwind CSS build)
    - package-ecosystem: "npm"
      directory: "/HurrahTv.Client"
      schedule:
          interval: "weekly"
          day: "monday"
      open-pull-requests-limit: 5
      reviewers:
          - "mkerchenski"
      labels:
          - "type:chore"
          - "area:client"
      commit-message:
          prefix: "deps(npm)"
      groups:
          patch-and-minor:
              update-types:
                  - "patch"
                  - "minor"

    # GitHub Actions workflows
    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "weekly"
          day: "monday"
      reviewers:
          - "mkerchenski"
      labels:
          - "type:chore"
          - "area:infra"
      commit-message:
          prefix: "deps(actions)"
      groups:
          patch-and-minor:
              update-types:
                  - "patch"
                  - "minor"
