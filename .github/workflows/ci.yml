name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

# cancel in-flight CI for the same PR when a new commit is pushed
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    # Postgres service container for HurrahTv.Api.Tests (WebApplicationFactory + real DB).
    # Trust auth keeps the test connection string identical to the local-dev default,
    # so the test fixture's default `Host=localhost;Username=postgres` works in both places.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: HurrahTv.Client/package-lock.json

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Verify formatting
        run: dotnet format --verify-no-changes --severity info --no-restore

      - name: Install npm dependencies
        working-directory: HurrahTv.Client
        run: npm ci

      - name: Build Tailwind CSS + icons
        working-directory: HurrahTv.Client
        run: npm run build:css
