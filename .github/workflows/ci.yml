name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

# cancel in-flight CI for the same PR when a new commit is pushed
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: HurrahTv.Client/package-lock.json

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Verify formatting
        run: dotnet format --verify-no-changes --severity info --no-restore

      - name: Install npm dependencies
        working-directory: HurrahTv.Client
        run: npm ci

      - name: Build Tailwind CSS + icons
        working-directory: HurrahTv.Client
        run: npm run build:css
