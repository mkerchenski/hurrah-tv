name: Build and deploy Hurrah.tv

on:
  push:
    branches:
      - main
    paths:
      - 'HurrahTv.Api/**'
      - 'HurrahTv.Client/**'
      - 'HurrahTv.Shared/**'
      - '!HurrahTv.Client/node_modules/**'
  workflow_dispatch:

permissions:
  contents: read

# Serialize every staging deploy and the prod swap into one queue so they can never
# overlap. Two near-simultaneous merges to main used to race their staging deploys —
# the later-finishing (older-commit) deploy clobbered the newer one on the slot, so a
# swap then promoted a build missing the most recent PR. cancel-in-progress: false
# queues runs in trigger order (latest-pending wins) rather than cancelling a deploy
# mid-flight, which could leave the slot half-written. swap.yml shares this group.
concurrency:
  group: hurrahtv-deploy-pipeline
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: 'Staging'

    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      # capture the resolved SDK version explicitly — actions/setup-dotnet doesn't reliably
      # expose it as a step output, so a key referencing that output could render empty and
      # never invalidate. `dotnet --version` is the source of truth.
      - name: Resolve SDK version for cache key
        id: sdk
        run: echo "version=$(dotnet --version)" >> "$GITHUB_OUTPUT"

      # cache the wasm-tools workload (~500 MB) so it isn't re-downloaded every deploy.
      # workloads install under $DOTNET_ROOT; key on the resolved SDK version so a .NET
      # bump invalidates the cache. on a miss the install step below repopulates these dirs.
      - name: Cache wasm-tools workload
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.DOTNET_ROOT }}/sdk-manifests
            ${{ env.DOTNET_ROOT }}/packs
            ${{ env.DOTNET_ROOT }}/metadata
          key: ${{ runner.os }}-wasmtools-${{ steps.sdk.outputs.version }}

      # required for the Client WASM publish to relink dotnet.native.wasm (#3).
      # without it, dotnet publish falls back to "without optimizations" and the
      # client ships ~15% larger. fast no-op on a warm workload cache.
      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: HurrahTv.Client/package-lock.json

      - name: Build CSS (minified) and icons
        working-directory: HurrahTv.Client
        run: |
          npm ci
          npm run build:css:min

      - name: Cache-bust CSS + JS references
        working-directory: HurrahTv.Client
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          sed -i "s|href=\"css/app.css\"|href=\"css/app.css?v=$SHORT_SHA\"|" wwwroot/index.html
          sed -i "s|href=\"css/icons.css\"|href=\"css/icons.css?v=$SHORT_SHA\"|" wwwroot/index.html
          # rum.js (#201) is a plain <script src>, not fingerprinted — bust it like the CSS so a
          # deploy that changes beacon logic isn't served stale from the SW cacheFirst branch
          sed -i "s|src=\"js/rum.js\"|src=\"js/rum.js?v=$SHORT_SHA\"|" wwwroot/index.html
          grep -q "v=$SHORT_SHA" wwwroot/index.html || { echo "Cache-bust injection failed"; exit 1; }
          grep -q "js/rum.js?v=$SHORT_SHA" wwwroot/index.html || { echo "rum.js cache-bust injection failed"; exit 1; }

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Publish Client (WASM)
        run: dotnet publish HurrahTv.Client/HurrahTv.Client.csproj -c Release -o client-output

      - name: Publish API
        run: dotnet publish HurrahTv.Api/HurrahTv.Api.csproj -c Release -o api-output

      - name: Copy WASM files into API wwwroot
        run: |
          cp -r client-output/wwwroot/* api-output/wwwroot/ 2>/dev/null || true
          cp -r client-output/wwwroot/. api-output/wwwroot/

      - name: Stamp build version into appsettings
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          # merge BuildVersion into the API's appsettings.json
          jq --arg v "$SHORT_SHA" '. + {BuildVersion: $v}' api-output/appsettings.json > api-output/appsettings.tmp \
            && mv api-output/appsettings.tmp api-output/appsettings.json \
            || { rm -f api-output/appsettings.tmp; echo "Failed to stamp api BuildVersion"; exit 1; }
          # also stamp into the WASM client's appsettings.json — IConfiguration on the
          # client reads from wwwroot/appsettings.json, not the API's, so without this
          # step ShareService's cache-bust import (?v={sha}) silently no-ops in prod.
          jq --arg v "$SHORT_SHA" '. + {BuildVersion: $v}' api-output/wwwroot/appsettings.json > api-output/wwwroot/appsettings.tmp \
            && mv api-output/wwwroot/appsettings.tmp api-output/wwwroot/appsettings.json \
            || { rm -f api-output/wwwroot/appsettings.tmp; echo "Failed to stamp client BuildVersion"; exit 1; }
          # stamp the same SHA into the service worker so each deploy gets a fresh cache
          # namespace (hurrah-cache-$SHORT_SHA); activate() then drops the old one (#15)
          sed -i "s|__BUILD_VERSION__|$SHORT_SHA|" api-output/wwwroot/service-worker.js
          grep -q "$SHORT_SHA" api-output/wwwroot/service-worker.js || { echo "SW version stamp failed"; exit 1; }

      - name: Remove dev config from client output
        run: rm -f api-output/wwwroot/appsettings.Development.json

      - name: Deploy to Azure Web App staging slot
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'HurrahTv-Api'
          slot-name: 'staging'
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          package: api-output
          clean: true

      - name: Restart staging slot
        run: |
          SCM_USER=$(echo '${{ secrets.AZURE_API_PUBLISH_PROFILE }}' | sed -n 's/.*userName="\([^"]*\)".*/\1/p' | head -1)
          SCM_PASS=$(echo '${{ secrets.AZURE_API_PUBLISH_PROFILE }}' | sed -n 's/.*userPWD="\([^"]*\)".*/\1/p' | head -1)
          curl -sf -X POST -u "$SCM_USER:$SCM_PASS" \
            "https://hurrahtv-api-staging.scm.azurewebsites.net/api/restart/" || true
          sleep 10
