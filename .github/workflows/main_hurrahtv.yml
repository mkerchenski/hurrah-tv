name: Build and deploy Hurrah.tv

on:
  push:
    branches:
      - main
    paths:
      - 'HurrahTv.Api/**'
      - 'HurrahTv.Client/**'
      - 'HurrahTv.Shared/**'
      - '!HurrahTv.Client/node_modules/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: 'Staging'

    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: HurrahTv.Client/package-lock.json

      - name: Build CSS (minified) and icons
        working-directory: HurrahTv.Client
        run: |
          npm ci
          npm run build:css:min

      - name: Cache-bust CSS references
        working-directory: HurrahTv.Client
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          sed -i "s|href=\"css/app.css\"|href=\"css/app.css?v=$SHORT_SHA\"|" wwwroot/index.html
          sed -i "s|href=\"css/icons.css\"|href=\"css/icons.css?v=$SHORT_SHA\"|" wwwroot/index.html
          grep -q "v=$SHORT_SHA" wwwroot/index.html || { echo "Cache-bust injection failed"; exit 1; }

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Publish Client (WASM)
        run: dotnet publish HurrahTv.Client/HurrahTv.Client.csproj -c Release -o client-output

      - name: Publish API
        run: dotnet publish HurrahTv.Api/HurrahTv.Api.csproj -c Release -o api-output

      - name: Copy WASM files into API wwwroot
        run: |
          cp -r client-output/wwwroot/* api-output/wwwroot/ 2>/dev/null || true
          cp -r client-output/wwwroot/. api-output/wwwroot/

      - name: Stamp build version into appsettings
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          # merge BuildVersion into existing appsettings.json
          jq --arg v "$SHORT_SHA" '. + {BuildVersion: $v}' api-output/appsettings.json > api-output/appsettings.tmp \
            && mv api-output/appsettings.tmp api-output/appsettings.json \
            || { rm -f api-output/appsettings.tmp; echo "Failed to stamp build version"; exit 1; }

      - name: Remove dev config from client output
        run: rm -f api-output/wwwroot/appsettings.Development.json

      - name: Deploy to Azure Web App staging slot
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'HurrahTv-Api'
          slot-name: 'staging'
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          package: api-output
          clean: true

      - name: Restart staging slot
        run: |
          SCM_USER=$(echo '${{ secrets.AZURE_API_PUBLISH_PROFILE }}' | sed -n 's/.*userName="\([^"]*\)".*/\1/p' | head -1)
          SCM_PASS=$(echo '${{ secrets.AZURE_API_PUBLISH_PROFILE }}' | sed -n 's/.*userPWD="\([^"]*\)".*/\1/p' | head -1)
          curl -sf -X POST -u "$SCM_USER:$SCM_PASS" \
            "https://hurrahtv-api-staging.scm.azurewebsites.net/api/restart/" || true
          sleep 10
