name: Swap staging to production

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  swap:
    runs-on: ubuntu-latest
    environment:
      name: 'Production'

    steps:
      - name: Login to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Swap staging to production
        run: |
          az webapp deployment slot swap \
            --resource-group hurrahweb \
            --name HurrahTv-Api \
            --slot staging \
            --target-slot production

      - name: Verify production health
        run: |
          # cold start of the new prod slot includes .NET host boot + DbService.InitializeAsync
          # (PostgreSQL migrations). Poll up to 120s before declaring the deploy unhealthy —
          # a single-shot 15s check used to flag healthy deploys as failures.
          DEADLINE=$((SECONDS + 120))
          ATTEMPT=0
          while [ $SECONDS -lt $DEADLINE ]; do
            ATTEMPT=$((ATTEMPT + 1))
            STATUS=$(curl -sk --max-time 10 -o /dev/null -w "%{http_code}" https://hurrahtv-api.azurewebsites.net/api/health || echo "000")
            echo "[attempt $ATTEMPT, t+${SECONDS}s] /api/health → $STATUS"
            if [ "$STATUS" = "200" ]; then
              VERSION=$(curl -sk --max-time 5 https://hurrahtv-api.azurewebsites.net/api/version || true)
              echo "Production healthy. Version: $VERSION"
              exit 0
            fi
            sleep 6
          done
          echo "Production did not become healthy within 120s. Consider swapping back via /deploy now."
          exit 1
