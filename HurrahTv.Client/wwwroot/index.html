<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Hurrah.tv</title>
    <base href="/" />

    <!-- warm the TMDb image CDN connection early so poster/backdrop fetches skip DNS+TLS setup
         once the WASM app discovers them post-boot (#175). crossorigin because the images are
         fetched anonymously from a different origin. -->
    <link rel="preconnect" href="https://image.tmdb.org" crossorigin />

    <!-- site-wide meta + Open Graph + Twitter Card. Blazor WASM doesn't SSR, so iOS Safari
         / iMessage / Twitter link-preview bots only ever see what's in this static HTML.
         Per-show OG (using TMDb backdrop + title for /details/{type}/{id}) needs a
         server-side bot-detect path on the Api project — tracked separately. -->
    <meta name="description" content="One smart watchlist across all your streaming services. Search what's available on Netflix, Hulu, Disney+ and more — keep one queue, no juggling." />
    <meta name="theme-color" content="#E50914" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Hurrah.tv" />
    <meta property="og:title" content="Hurrah.tv — one watchlist across every streaming service" />
    <meta property="og:description" content="Search what's available on Netflix, Hulu, Disney+ and more. Keep one smart queue, no juggling." />
    <meta property="og:url" content="https://hurrah.tv/" />
    <meta property="og:image" content="https://hurrah.tv/icon-512.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Hurrah.tv — one watchlist across every streaming service" />
    <meta name="twitter:description" content="Search what's available on Netflix, Hulu, Disney+ and more. Keep one smart queue, no juggling." />
    <meta name="twitter:image" content="https://hurrah.tv/icon-512.png" />

    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/icons.css" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
    <link rel="icon" href="favicon.ico" sizes="16x16 32x32 48x48" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <script type="importmap"></script>
    <!-- capture beforeinstallprompt early (issue #15): the event fires before the WASM
         runtime boots and the lazy js/install.js module loads, so a listener registered
         later would miss it. Stash the deferred event for the module to consume. -->
    <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            window.__hurrahInstallPrompt = e;
            // notify the install banner if it has already subscribed (event can fire after render)
            if (window.__hurrahNotifyInstall) window.__hurrahNotifyInstall();
        });
        window.addEventListener('appinstalled', () => { window.__hurrahInstallPrompt = null; });
    </script>
    <!-- host/env detection, computed once for the pre-boot scripts that gate on it: Sentry +
         Clarity below and the service-worker registration at the end of <body>. Defined here,
         before any consumer in document order, so each reads one decision instead of re-inlining
         the localhost regex / staging check. Plain object on window because these are classic
         inline scripts that run before the WASM runtime boots. -->
    <script>
        window.__hurrahHostEnv = (function () {
            var isLocal = /^(localhost|127\.0\.0\.1)$/.test(location.hostname);
            var isStaging = location.hostname.indexOf('staging') >= 0;
            return { isLocal: isLocal, isStaging: isStaging, isProd: !isLocal && !isStaging };
        })();
    </script>
    <!-- RUM beacon (issue #201): classic early script so it still reports when a slow WASM
         boot is the problem. Self-gates to prod + slow/sampled loads; never throws into the page. -->
    <script defer src="js/rum.js"></script>
    <!-- Sentry browser error monitoring (#24). Lazy Loader Script: a ~1.5KB async stub that
         installs error handlers immediately — so even a failed WASM boot is captured — and only
         fetches the full SDK once an error actually fires. Errors-only (tracesSampleRate 0); App
         Insights owns RUM/performance (#201), so Sentry adds no per-interaction overhead. The
         script is inserted dynamically (never a parser-blocking <script src> in head) so it can't
         sit on the #200 boot critical path. Gated to non-local hosts + a real key: localhost and
         an unset/placeholder key no-op, while staging AND production both report (each env-tagged,
         so we catch errors pre-prod). Unlike rum.js (prod-only, to keep RUM volume down), error
         monitoring is worth running on staging too. Never throws into the page. CI replaces the
         __SENTRY_LOADER_KEY__/__BUILD_VERSION__ placeholders. -->
    <script>
        (function () {
            var key = '__SENTRY_LOADER_KEY__';
            if (key.indexOf('__') === 0 || key === '') return;     // placeholder not replaced / no key
            if (window.__hurrahHostEnv.isLocal) return;            // never on local dev
            // lowercase to match the API's normalized Sentry environment (one filter across surfaces)
            var env = window.__hurrahHostEnv.isStaging ? 'staging' : 'production';
            var release = '__BUILD_VERSION__';
            if (release.indexOf('__') === 0) release = undefined;   // unstamped (dev) — let Sentry omit it
            // strip the query string + fragment off a URL. Defense-in-depth mirroring the server's
            // PiiRedactionProcessor: a value that ever lands in a client URL (search terms, an
            // accidental token) must not reach Sentry. The server redacts selectively to keep
            // diagnostics; the client can afford to drop the whole query — error reports key on the
            // path + stack. Wholesale strip, so there's no redaction regex to keep in sync across C#/JS.
            function stripQuery(u) {
                if (typeof u !== 'string') return u;
                var cut = u.search(/[?#]/);
                return cut === -1 ? u : u.slice(0, cut);
            }
            // the loader invokes this before it initializes, letting us override project defaults
            window.sentryOnLoad = function () {
                window.Sentry.init({
                    environment: env,
                    release: release,
                    tracesSampleRate: 0,      // errors only — no performance/transaction tracing
                    sendDefaultPii: false,    // never send IP/headers/cookies (this is a phone-number app)
                    beforeSend: function (event) {
                        if (event.request) {
                            if (event.request.url) event.request.url = stripQuery(event.request.url);
                            if (event.request.query_string) delete event.request.query_string;
                        }
                        return event;
                    },
                    beforeBreadcrumb: function (crumb) {
                        // navigation crumbs carry from/to URLs; fetch/xhr crumbs carry data.url
                        if (crumb && crumb.data) {
                            if (crumb.data.url) crumb.data.url = stripQuery(crumb.data.url);
                            if (crumb.data.from) crumb.data.from = stripQuery(crumb.data.from);
                            if (crumb.data.to) crumb.data.to = stripQuery(crumb.data.to);
                        }
                        return crumb;
                    }
                });
            };
            var s = document.createElement('script');
            s.src = 'https://js.sentry-cdn.com/' + key + '.min.js';
            s.crossOrigin = 'anonymous';
            s.async = true;
            (document.head || document.documentElement).appendChild(s);
        })();
    </script>
    <!-- Microsoft Clarity product analytics (#63): session recordings + heatmaps to inform UX.
         Production-ONLY — unlike error monitoring (Sentry, staging+prod) this mirrors rum.js's
         prod-only stance: staging sessions are just us testing and would pollute the recordings
         and heatmaps. The project ID is injected at build time by CI from the GitHub `CLARITY_PROJECT_ID`
         variable (same mechanism as the Sentry loader key above) — WASM is static + this script runs
         pre-boot, so runtime appsettings can't reach it; build-time substitution is the client-config
         mechanism. The ID is a PUBLIC tracking ID, not a secret. An unset variable resolves to empty
         and the gate below no-ops, so this is merge-safe. Clarity masks all input-box text in every
         mode; phone/OTP fields and the displayed phone number also carry explicit data-clarity-mask
         (defense-in-depth, robust if the masking mode is ever relaxed). Loaded async via the standard
         tag, gated behind the host check so it never sits on the #200 WASM-boot critical path. -->
    <script>
        (function () {
            var id = '__CLARITY_PROJECT_ID__';
            if (id.indexOf('__') === 0 || id === '') return;     // placeholder not replaced / unset
            if (!window.__hurrahHostEnv.isProd) return;          // prod-only: skip localhost + staging (UX volume; mirror rum.js)
            (function (c, l, a, r, i, t, y) {
                c[a] = c[a] || function () { (c[a].q = c[a].q || []).push(arguments) };
                t = l.createElement(r); t.async = 1; t.src = 'https://www.clarity.ms/tag/' + i;
                y = l.getElementsByTagName(r)[0]; y.parentNode.insertBefore(t, y);
            })(window, document, 'clarity', 'script', id);
        })();
    </script>
</head>

<body class="bg-surface text-gray-100 min-h-screen">
    <div id="app">
        <div class="flex items-center justify-center min-h-screen">
            <div class="text-center">
                <div class="text-4xl font-bold text-accent mb-4">hurrah.tv</div>
                <div class="w-8 h-8 border-2 border-accent border-t-transparent rounded-full animate-spin mx-auto"></div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui" class="fixed bottom-0 left-0 right-0 bg-red-900 text-white p-4 text-center hidden">
        An unhandled error has occurred.
        <a href="." class="underline ml-2">Reload</a>
        <span class="dismiss cursor-pointer ml-4">&#x2715;</span>
    </div>
    <!-- SortableJS loaded as a global; consumed by wwwroot/js/sortable.js (issue #87) -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <!-- PWA service worker (issue #15). Skipped on localhost so dotnet watch hot-reload
         isn't intercepted by a cache; test the SW against a published build via the Api. -->
    <script>
        if ('serviceWorker' in navigator && !window.__hurrahHostEnv.isLocal) {
            navigator.serviceWorker.register('/service-worker.js').catch(() => { });
        }
    </script>
</body>

</html>
