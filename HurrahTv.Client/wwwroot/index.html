<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Hurrah.tv</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/icons.css" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
    <link rel="icon" href="favicon.ico" sizes="16x16 32x32 48x48" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <script type="importmap"></script>
</head>

<body class="bg-surface text-gray-100 min-h-screen">
    <div id="app">
        <div class="flex items-center justify-center min-h-screen">
            <div class="text-center">
                <div class="text-4xl font-bold text-accent mb-4">hurrah.tv</div>
                <div class="w-8 h-8 border-2 border-accent border-t-transparent rounded-full animate-spin mx-auto"></div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui" class="fixed bottom-0 left-0 right-0 bg-red-900 text-white p-4 text-center hidden">
        An unhandled error has occurred.
        <a href="." class="underline ml-2">Reload</a>
        <span class="dismiss cursor-pointer ml-4">&#x2715;</span>
    </div>
    <script>
        window.hurrahScrollRow = (el, delta) => { if (el) el.scrollBy({ left: delta, behavior: 'smooth' }); };
        window.hurrahShouldShowInstallBanner = () => {
            try {
                if (window.matchMedia('(display-mode: standalone)').matches) return false;
                if (navigator.standalone) return false;
                if (localStorage.getItem('hurrah-install-dismissed')) return false;
                const ua = navigator.userAgent;
                const isIos = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
                const isSafari = /Safari/.test(ua) && !/CriOS|FxiOS|EdgiOS|OPiOS/.test(ua);
                return isIos && isSafari;
            } catch { return false; }
        };
        window.hurrahDismissInstallBanner = () => {
            try { localStorage.setItem('hurrah-install-dismissed', '1'); } catch {}
        };
        window._hurrahVersion = null;
        window.hurrahCheckVersion = async () => {
            try {
                const res = await fetch('/api/version', { cache: 'no-store' });
                if (!res.ok) return false;
                const data = await res.json();
                if (!window._hurrahVersion) { window._hurrahVersion = data.version; return false; }
                return data.version !== window._hurrahVersion;
            } catch { return false; }
        };
        window.hurrahLongPress = (el, dotNetRef, callbackName, itemId) => {
            if (!el) return null;
            let timer = null, startX = 0, startY = 0, fired = false, activeEvent = null;
            const onStart = (e) => {
                if (!e.touches.length) return;
                // skip when the touch starts on a sortable drag handle — Sortable owns that gesture
                if (e.target?.closest?.('.drag-handle')) return;
                const t = e.touches[0];
                startX = t.clientX; startY = t.clientY; fired = false;
                activeEvent = e;
                timer = setTimeout(() => {
                    fired = true;
                    // preventDefault on the live touch suppresses iOS Safari's native image callout
                    // (big-poster peek / save-image sheet) that otherwise hijacks long-press
                    try { activeEvent?.preventDefault?.(); } catch {}
                    try { navigator.vibrate?.(50); } catch {}
                    dotNetRef.invokeMethodAsync(callbackName, itemId);
                }, 500);
            };
            const onMove = (e) => {
                if (!timer || !e.touches.length) return;
                const t = e.touches[0];
                if (Math.abs(t.clientX - startX) > 10 || Math.abs(t.clientY - startY) > 10) {
                    clearTimeout(timer); timer = null;
                }
            };
            const onEnd = () => { clearTimeout(timer); timer = null; activeEvent = null; };
            const onContextMenu = (e) => { if (fired) e.preventDefault(); };
            const onClick = (e) => { if (fired) { e.stopPropagation(); e.preventDefault(); fired = false; } };
            // touchstart must be non-passive so preventDefault can cancel the native callout
            el.addEventListener('touchstart', onStart, { passive: false });
            el.addEventListener('touchmove', onMove, { passive: true });
            el.addEventListener('touchend', onEnd);
            el.addEventListener('touchcancel', onEnd);
            el.addEventListener('contextmenu', onContextMenu);
            el.addEventListener('click', onClick, true);
            return { el, onStart, onMove, onEnd, onClick, onContextMenu };
        };
        window.hurrahLongPressCleanup = (handle) => {
            if (!handle?.el) return;
            handle.el.removeEventListener('touchstart', handle.onStart);
            handle.el.removeEventListener('touchmove', handle.onMove);
            handle.el.removeEventListener('touchend', handle.onEnd);
            handle.el.removeEventListener('touchcancel', handle.onEnd);
            if (handle.onContextMenu) handle.el.removeEventListener('contextmenu', handle.onContextMenu);
            handle.el.removeEventListener('click', handle.onClick, true);
        };
        window.hurrahSortableInit = (el, dotNetRef, callbackName, options) => {
            if (!el || !window.Sortable) return null;
            const opts = Object.assign({
                handle: '.drag-handle',
                animation: 150,
                delay: 0,
                delayOnTouchOnly: true,
                touchStartThreshold: 5,
                ghostClass: 'sortable-ghost',
                chosenClass: 'sortable-chosen',
                dragClass: 'sortable-drag',
            }, options || {});
            opts.onEnd = (evt) => {
                if (evt.oldIndex === evt.newIndex) return;
                const itemId = parseInt(evt.item?.dataset?.itemId, 10);
                if (isNaN(itemId)) return;
                dotNetRef.invokeMethodAsync(callbackName, itemId, evt.oldIndex, evt.newIndex);
            };
            const instance = Sortable.create(el, opts);
            return { instance };
        };
        window.hurrahSortableDispose = (handle) => {
            if (!handle?.instance) return;
            try { handle.instance.destroy(); } catch {}
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
